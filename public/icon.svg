<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Royal Blue 라운드 사각 배경 -->
  <rect width="512" height="512" rx="96" fill="#1e3a8a"/>

  <!-- 두꺼운 S — SVG path 로 직접 그림 (폰트 의존 없음) -->
  <g transform="translate(126, 70) scale(2.6)">
    <path
      d="M 75 28 Q 75 10 50 10 Q 25 10 25 30 Q 25 50 50 50 Q 75 50 75 70 Q 75 90 50 90 Q 25 90 25 72"
      stroke="#fbbf24"
      stroke-width="18"
      stroke-linecap="butt"
      stroke-linejoin="miter"
      fill="none"
    />
  </g>

  <!-- BUSINESS 호 path — 안전영역 안에 위치 -->
  <defs>
    <path id="arc-business" d="M 130 360 Q 256 415 382 360" fill="none"/>
  </defs>

  <!-- S 아래쪽 둥근 호 'BUSINESS' 텍스트 -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="38"
        font-weight="800"
        letter-spacing="6"
        fill="#fbbf24">
    <textPath href="#arc-business" startOffset="50%" text-anchor="middle">
      BUSINESS
    </textPath>
  </text>
</svg>
