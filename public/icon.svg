<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Royal Blue 라운드 사각 배경 -->
  <rect width="512" height="512" rx="96" fill="#1e3a8a"/>

  <!-- 안쪽 골드 액센트 라인 (안전영역 안에 위치) -->
  <rect x="48" y="48" width="416" height="416" rx="60"
        fill="none" stroke="#fbbf24" stroke-width="4" opacity="0.4"/>

  <!-- 가운데 큰 굵은 S — sans-serif Black 900 -->
  <text x="256" y="240"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="280"
        font-weight="900"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-12"
        fill="#fbbf24">S</text>

  <!-- BUSINESS 텍스트 호 path — 안전영역 안에 위치 (y ~ 360) -->
  <defs>
    <path id="arc-business" d="M 120 360 Q 256 420 392 360" fill="none"/>
  </defs>

  <!-- S 아래쪽 둥근 호 'BUSINESS' 텍스트 — 굵게, 안전영역 안 -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="38"
        font-weight="800"
        letter-spacing="5"
        fill="#fbbf24">
    <textPath href="#arc-business" startOffset="50%" text-anchor="middle">
      BUSINESS
    </textPath>
  </text>
</svg>
